{% extends "base.html" %}

{% block title %}Create Account - Retail Analytics{% endblock %}

{% block content %}
<div class="auth-panel panel">
    <h2>Create Account</h2>

    {% if error %}
        <div class="alert alert-danger">{{ error }}</div>
    {% endif %}

    <form method="POST" id="signupForm" class="auth-form" novalidate>
        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" required autocomplete="username">
        </div>
        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" required autocomplete="email">
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" minlength="6" required autocomplete="new-password">
            <small class="text-muted" style="font-size: 0.75rem; display: block; margin-top: 0.25rem;">At least 6 characters.</small>
        </div>
        <div class="form-group">
            <label for="confirm_password">Confirm Password</label>
            <input type="password" id="confirm_password" name="confirm_password" required autocomplete="new-password">
            <div id="confirmError" class="alert alert-danger d-none" style="margin-top: 0.5rem; padding: 0.4rem 0.8rem; font-size: 0.75rem;">
                Passwords do not match.
            </div>
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%;">Register</button>
    </form>

    <p class="text-center" style="margin-top: 1.5rem; font-size: 0.85rem;">
        Already have an account? <a href="/login" style="color: var(--accent-cyan); text-decoration: none;">Sign in</a>
    </p>
</div>
{% endblock %}

{% block scripts %}
<script>
document.addEventListener('DOMContentLoaded', function () {
    var form = document.getElementById('signupForm');
    var password = document.getElementById('password');
    var confirm = document.getElementById('confirm_password');
    var confirmError = document.getElementById('confirmError');

    function validate() {
        if (confirm.value && password.value !== confirm.value) {
            confirm.setCustomValidity('Passwords do not match');
            confirmError.classList.remove('d-none');
        } else {
            confirm.setCustomValidity('');
            confirmError.classList.add('d-none');
        }
    }

    password.addEventListener('input', validate);
    confirm.addEventListener('input', validate);
});
</script>
{% endblock %}
