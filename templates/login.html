{% extends "base.html" %}

{% block title %}Sign In - Retail Analytics{% endblock %}

{% block content %}
<div class="auth-panel panel">
    <h2>Sign In</h2>
    
    {% if error %}
        <div class="alert alert-danger">{{ error }}</div>
    {% endif %}
    
    <form method="POST" class="auth-form">
        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" required autocomplete="username">
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%;">Sign In</button>
    </form>
    
    <p class="text-muted text-center" style="margin-top: 1.5rem; font-size: 0.85rem;">
        Demo Credentials: <span class="tag-mono">admin / admin</span>
    </p>
    <p class="text-center" style="margin-top: 1rem; font-size: 0.85rem;">
        Don't have an account? <a href="/signup" style="color: var(--accent-cyan); text-decoration: none;">Create one</a>
    </p>
</div>
{% endblock %}
